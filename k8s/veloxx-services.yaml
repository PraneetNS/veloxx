---
# REST/WS Gateway (External Access)
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: veloxx
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
# Ingest Gateway (External OTel/REST Ingest)
apiVersion: v1
kind: Service
metadata:
  name: ingest-service
  namespace: veloxx
spec:
  type: LoadBalancer
  selector:
    app: ingest
  ports:
  - name: http-ingest
    port: 4317
    targetPort: 4317
  - name: grpc-ingest
    port: 4318
    targetPort: 4318
---
# Dashboard (External Access)
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: veloxx
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
  - name: web
    port: 80
    targetPort: 3000
---
# AI Engine (Internal Access)
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: veloxx
spec:
  type: ClusterIP
  selector:
    app: ai-engine
  ports:
  - name: http
    port: 8000
    targetPort: 8000
